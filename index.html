<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Strategy Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        * {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
        }

        .gradient-text {
            background: linear-gradient(120deg, #06b6d4, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-hover {
            transition: all 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .input-focus {
            transition: all 0.2s ease;
        }

        .input-focus:focus {
            transform: translateY(-1px);
        }

        .btn-pulse {
            animation: pulse-btn 2s infinite;
        }

        @keyframes pulse-btn {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .chartjs-tooltip {
            background: rgba(15, 23, 42, 0.95);
            color: #06b6d4;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid rgba(6, 182, 212, 0.3);
            pointer-events: none;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .chartjs-tooltip-key {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 8px;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen antialiased">

    <div class="min-h-screen flex flex-col">
        <div class="container mx-auto px-4 py-8 md:py-12 max-w-6xl flex-1">

            <!-- Header -->
            <header class="text-center mb-12 md:mb-16">
                <div class="mb-4">
                    <h1 class="text-5xl md:text-6xl font-bold text-white mb-3 tracking-tight">
                        F1 Strategy <span class="gradient-text">Simulator</span>
                    </h1>
                </div>
                <p class="text-base md:text-lg text-slate-400 font-light">
                    Optimize your pit stop strategy with real F1 data
                </p>
            </header>

            <!-- Simulation Form -->
            <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl p-6 md:p-8 mb-10 card-hover shadow-2xl">
                <form id="simulation-form" class="form-grid grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-6">

                <!-- Driver Selection -->
                <div>
                    <label for="driver_name" class="block text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wide">Driver</label>
                    <select id="driver_name" name="driver_name"
                        class="w-full bg-slate-700/50 border border-slate-600/50 text-white rounded-lg p-3 input-focus focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/50 transition text-sm">
                        <option value="" disabled selected>Loading drivers...</option>
                    </select>
                </div>

                <!-- Race Selection -->
                <div>
                    <label for="race_name" class="block text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wide">Race</label>
                    <select id="race_name" name="race_name"
                        class="w-full bg-slate-700/50 border border-slate-600/50 text-white rounded-lg p-3 input-focus focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/50 transition text-sm">
                        <option value="" disabled selected>Loading races...</option>
                    </select>
                </div>

                <!-- Pit Stop Loss -->
                <div>
                    <label for="pit_stop_loss" class="block text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wide">Pit Loss (s)</label>
                    <input type="number" id="pit_stop_loss" name="pit_stop_loss" value="22" step="0.1"
                        class="w-full bg-slate-700/50 border border-slate-600/50 text-white rounded-lg p-3 input-focus focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500/50 transition text-sm">
                </div>

                <!-- Total Laps (Read-only) -->
                <div>
                    <label for="total_laps_input" class="block text-xs font-semibold text-slate-300 mb-2 uppercase tracking-wide">Total Laps</label>
                    <input type="text" id="total_laps_input" name="total_laps_input" value="N/A" readonly
                        class="w-full bg-slate-600/30 border border-slate-600/30 text-slate-400 rounded-lg p-3 cursor-not-allowed text-sm font-medium">
                </div>

                <!-- Submit Button -->
                <div class="md:col-span-4 pt-2">
                    <button type="submit" id="run-simulation-btn"
                        class="w-full bg-gradient-to-r from-cyan-500 to-blue-500 hover:from-cyan-400 hover:to-blue-400 text-white font-bold py-3 px-6 rounded-lg transition duration-300 ease-in-out flex items-center justify-center shadow-lg hover:shadow-xl">
                        <span id="btn-text">Run Simulation</span>
                        <svg id="loading-spinner" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <!-- Error Display -->
        <div id="error-display" class="bg-red-500/10 border border-red-500/30 text-red-300 p-4 rounded-lg mb-8 hidden backdrop-blur-sm"
            role="alert">
            <p class="font-semibold text-sm">⚠ Error</p>
            <p id="error-text" class="text-sm mt-1">Something went wrong.</p>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="hidden animation-fade-in">
            <!-- Summary of Top 3 -->
            <div class="mb-12">
                <h2 class="text-2xl md:text-3xl font-bold text-white mb-6 flex items-center">
                    <span class="w-1 h-8 bg-gradient-to-b from-cyan-500 to-blue-500 rounded-full mr-3"></span>
                    Top Strategies
                </h2>
                <div id="results-summary" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Results will be injected here by JavaScript -->
                </div>
            </div>

            <!-- Tyre Degradation Display -->
            <div class="mb-12">
                <h2 class="text-2xl md:text-3xl font-bold text-white mb-6 flex items-center">
                    <span class="w-1 h-8 bg-gradient-to-b from-cyan-500 to-blue-500 rounded-full mr-3"></span>
                    Tyre Degradation
                </h2>
                <div id="degradation-summary" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Degradation data will be injected here -->
                </div>
            </div>

            <!-- Visualization -->
            <div>
                <h2 class="text-2xl md:text-3xl font-bold text-white mb-6 flex items-center">
                    <span class="w-1 h-8 bg-gradient-to-b from-cyan-500 to-blue-500 rounded-full mr-3"></span>
                    Strategy Breakdown
                </h2>
                <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl p-6 md:p-8 shadow-2xl card-hover">
                    <canvas id="strategy-chart"></canvas>
                </div>
            </div>
        </div>
        </div>
    </div>

    <script>
        // --- Globals ---
        const API_BASE_URL = 'http://127.0.0.1:8000';
        const formEl = document.getElementById('simulation-form');
        const driverSelectEl = document.getElementById('driver_name');
        const raceSelectEl = document.getElementById('race_name');
        const pitLossEl = document.getElementById('pit_stop_loss');
        const totalLapsEl = document.getElementById('total_laps_input');

        const resultsSectionEl = document.getElementById('results-section');
        const resultsSummaryEl = document.getElementById('results-summary');
        const errorEl = document.getElementById('error-display');
        const errorTextEl = document.getElementById('error-text');

        const runBtn = document.getElementById('run-simulation-btn');
        const btnText = document.getElementById('btn-text');
        const loadingSpinner = document.getElementById('loading-spinner');

        let strategyChart = null; // To hold the Chart.js instance

        // --- Event Listeners ---

        // Run on page load
        document.addEventListener('DOMContentLoaded', loadDropdownData);

        // Run on form submit
        formEl.addEventListener('submit', handleSimulationSubmit);

        // Run on race selection change
        raceSelectEl.addEventListener('change', handleRaceChange);


        // --- Functions ---

        /**
         * Fetches Drivers and Races from the API to populate dropdowns
         */
        async function loadDropdownData() {
            try {
                const response = await fetch(`${API_BASE_URL}/api-data`);
                if (!response.ok) {
                    throw new Error(`Server error: ${response.statusText}`);
                }
                const data = await response.json();

                // Populate Drivers
                driverSelectEl.innerHTML = '<option value="" disabled>Select a driver...</option>'; // Clear "loading"
                if (data.drivers && data.drivers.length > 0) {
                    data.drivers.forEach(driver => {
                        const option = document.createElement('option');
                        option.value = driver;
                        option.textContent = driver;
                        driverSelectEl.appendChild(option);
                    });
                    // Set default driver
                    driverSelectEl.value = data.drivers.includes('VER') ? 'VER' : data.drivers[0];
                } else {
                    driverSelectEl.innerHTML = '<option value="" disabled selected>No drivers found</option>';
                }

                // Populate Races
                raceSelectEl.innerHTML = '<option value="" disabled>Select a race...</option>'; // Clear "loading"
                if (data.races && data.races.length > 0) {
                    data.races.forEach(race => {
                        const option = document.createElement('option');
                        option.value = race;
                        option.textContent = race;
                        raceSelectEl.appendChild(option);
                    });
                    // Set default race to the first in the list
                    raceSelectEl.value = data.races[0];
                } else {
                    raceSelectEl.innerHTML = '<option value="" disabled selected>No races found</option>';
                }

                // After populating, trigger the lap count fetch for the default race
                await handleRaceChange();

            } catch (err) {
                console.error(err);
                showError('Could not load initial data. Is the API server running?');
                driverSelectEl.innerHTML = '<option value="" disabled selected>Error loading</option>';
                raceSelectEl.innerHTML = '<option value="" disabled selected>Error loading</option>';
            }
        }

        /**
         * Called when the race dropdown changes. Fetches total laps for that race.
         */
        async function handleRaceChange() {
            const selectedRace = raceSelectEl.value;
            if (!selectedRace) {
                totalLapsEl.value = 'N/A';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/get-laps/${encodeURIComponent(selectedRace)}`);
                if (!response.ok) {
                    throw new Error(`Could not find laps for ${selectedRace}`);
                }
                const data = await response.json();
                totalLapsEl.value = data.total_laps || 'N/A';
            } catch (err) {
                console.error(err);
                totalLapsEl.value = 'Error';
                showError(err.message);
            }
        }

        /**
         * Handles the main form submission
         */
        async function handleSimulationSubmit(e) {
            e.preventDefault(); // Stop form from reloading the page

            // Get form values
            const driverName = driverSelectEl.value;
            const raceName = raceSelectEl.value;
            const pitStopLoss = parseFloat(pitLossEl.value);

            if (!driverName || !raceName) {
                showError('Please select a driver and a race.');
                return;
            }

            // --- UI: Set loading state ---
            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/simulate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        driver_name: driverName,
                        race_name: raceName,
                        pit_stop_loss: pitStopLoss,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Simulation failed.');
                }

                // --- Success: Display results ---
                displayResults(data);

            } catch (err) {
                console.error(err);
                showError(err.message);
            } finally {
                // --- UI: Unset loading state ---
                setLoading(false);
            }
        }

        /**
         * Displays the results from the API
         */
        function displayResults(data) {
            // 1. Clear old results and show section
            resultsSummaryEl.innerHTML = '';
            const degEl = document.getElementById('degradation-summary');
            degEl.innerHTML = ''; // Clear old data
            resultsSectionEl.style.display = 'block';

            // 2. Populate Top 3 Results
            data.top_3_results.forEach((result, index) => {
                const isOptimal = index === 0;
                const card = document.createElement('div');
                card.className = `p-6 rounded-lg transition-all card-hover ${isOptimal ? 'bg-gradient-to-br from-cyan-500/10 to-blue-500/10 border-2 border-cyan-400/50 shadow-lg shadow-cyan-500/10' : 'bg-slate-800/30 border border-slate-700/50 hover:border-slate-600/50'}`;

                card.innerHTML = `
                    <div class="flex items-start justify-between mb-3">
                        <h3 class="text-lg font-bold ${isOptimal ? 'text-cyan-300' : 'text-slate-100'}">${result.name}</h3>
                        ${isOptimal ? '<span class="bg-cyan-500/20 text-cyan-300 text-xs font-semibold px-2 py-1 rounded">OPTIMAL</span>' : ''}
                    </div>
                    <p class="text-slate-400 text-sm mb-2">🏁 ${result.pit_stops_text}</p>
                    <p class="text-slate-300 text-sm font-mono">⏱ ${result.total_time_str}</p>
                    ${result.delta_str ? `<p class="text-yellow-400/70 text-xs mt-2 font-medium">${result.delta_str}</p>` : ''}
                `;
                resultsSummaryEl.appendChild(card);
            });

            // 3. Populate Tyre Degradation
            const tyreInfo = {
                "SOFT": { 
                    name: "Soft", 
                    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/F1_tire_Pirelli_PZero_Red.svg/250px-F1_tire_Pirelli_PZero_Red.svg.png",
                    fallback: "https://placehold.co/40x40/FF3333/000000?text=S"
                },
                "MEDIUM": { 
                    name: "Medium", 
                    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/F1_tire_Pirelli_PZero_Yellow.svg/250px-F1_tire_Pirelli_PZero_Yellow.svg.png",
                    fallback: "https://placehold.co/40x40/FFF333/000000?text=M"
                },
                "HARD": { 
                    name: "Hard", 
                    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d6/F1_tire_Pirelli_PZero_White.svg/250px-F1_tire_Pirelli_PZero_White.svg.png",
                    fallback: "https://placehold.co/40x40/EBEBEB/000000?text=H"
                }
            };


            const rates = data.simulation_parameters.final_degradation_rates;

            for (const compound in rates) {
                if (tyreInfo[compound]) {
                    const info = tyreInfo[compound];
                    const rate = rates[compound];

                    const card = document.createElement('div');
                    card.className = 'bg-slate-800/30 border border-slate-700/50 p-5 rounded-lg shadow-md card-hover transition-all hover:border-slate-600/50 hover:bg-slate-800/50';

                    card.innerHTML = `
                        <div class="flex items-center space-x-4">
                            <div class="flex-shrink-0">
                                <img src="${info.img}"
                                     alt="${info.name} tyre"
                                     class="w-12 h-12 rounded-lg object-cover"
                                     onerror="this.onerror=null; this.src='${info.fallback}';">
                            </div>
                            <div class="flex-1">
                                <p class="text-sm font-semibold text-slate-300 mb-1">${info.name} Tyre</p>
                                <p class="text-2xl font-bold text-cyan-400">${rate.toFixed(3)}</p>
                                <p class="text-xs text-slate-500 font-mono">seconds per lap</p>
                            </div>
                        </div>
                    `;

                    degEl.appendChild(card);
                }
            }

            // 4. Render Visualization
            renderChart(data.visualization_data);
        }

        /**
         * Renders the strategy bar chart using Chart.js
         */
        function renderChart(vizData) {
            const ctx = document.getElementById('strategy-chart').getContext('2d');

            const tyreColors = {
                'SOFT': 'rgba(255, 51, 51, 0.8)',
                'MEDIUM': 'rgba(255, 243, 51, 0.8)',
                'HARD': 'rgba(235, 235, 235, 0.8)',
            };
            const tyreBorderColors = {
                'SOFT': 'rgba(255, 51, 51, 1)',
                'MEDIUM': 'rgba(255, 243, 51, 1)',
                'HARD': 'rgba(235, 235, 235, 1)',
            };

            // Prepare data for Chart.js
            const labels = vizData.map(d => d.name);
            const datasets = [];

            // Find max number of stints to create enough datasets
            const maxStints = Math.max(...vizData.map(d => d.stints.length));

            for (let i = 0; i < maxStints; i++) {
                datasets.push({
                    label: `Stint ${i + 1}`,
                    data: vizData.map(d => (d.stints[i] ? d.stints[i].laps : 0)),
                    backgroundColor: vizData.map(d => (d.stints[i] ? tyreColors[d.stints[i].compound] : 'transparent')),
                    borderColor: vizData.map(d => (d.stints[i] ? tyreBorderColors[d.stints[i].compound] : 'transparent')),
                    borderWidth: 1,
                    // Store compound info for the tooltip
                    compounds: vizData.map(d => (d.stints[i] ? d.stints[i].compound : null)),
                });
            }

            // Destroy old chart if it exists
            if (strategyChart) {
                strategyChart.destroy();
            }

            // Create new chart
            strategyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                plugins: [ChartDataLabels],
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        x: {
                            stacked: true,
                            title: {
                                display: true,
                                text: 'Lap Distribution',
                                color: '#cbd5e1',
                                font: { size: 13, weight: '600' }
                            },
                            ticks: { color: '#94a3b8', font: { size: 12 } },
                            grid: { color: 'rgba(148, 163, 184, 0.1)', drawBorder: false }
                        },
                        y: {
                            stacked: true,
                            ticks: { color: '#cbd5e1', font: { size: 13, weight: '600' } },
                            grid: { display: false, drawBorder: false }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            enabled: false,
                            external: (context) => {
                                // Custom tooltip HTML
                                const tooltipModel = context.tooltip;
                                let tooltipEl = document.getElementById('chartjs-tooltip');

                                if (!tooltipEl) {
                                    tooltipEl = document.createElement('div');
                                    tooltipEl.id = 'chartjs-tooltip';
                                    tooltipEl.className = 'chartjs-tooltip';
                                    document.body.appendChild(tooltipEl);
                                }

                                if (tooltipModel.opacity === 0) {
                                    tooltipEl.style.opacity = 0;
                                    return;
                                }

                                const dataPoint = tooltipModel.dataPoints[0];
                                const dataset = context.chart.data.datasets[dataPoint.datasetIndex];
                                const compound = dataset.compounds[dataPoint.dataIndex];
                                const laps = dataPoint.raw;

                                if (!compound) return;

                                const color = dataset.backgroundColor[dataPoint.dataIndex];

                                tooltipEl.innerHTML = `
                                    <span class="chartjs-tooltip-key" style="background-color: ${color}; border: 1px solid ${color}"></span>
                                    ${compound} Tyre: ${laps} Laps
                                `;

                                const position = context.chart.canvas.getBoundingClientRect();
                                tooltipEl.style.opacity = 1;
                                tooltipEl.style.position = 'absolute';
                                tooltipEl.style.left = position.left + window.pageXOffset + tooltipModel.caretX + 'px';
                                tooltipEl.style.top = position.top + window.pageYOffset + tooltipModel.caretY + 'px';
                                tooltipEl.style.pointerEvents = 'none';
                            }
                        },
                        datalabels: {
                            color: 'black',
                            font: {
                                weight: 'bold'
                            },
                            formatter: (value, context) => {
                                // Show compound abbreviation inside the bar
                                const dataset = context.chart.data.datasets[context.datasetIndex];
                                const compound = dataset.compounds[context.dataIndex];
                                return compound ? compound[0] : ''; // S, M, H
                            }
                        }
                    }
                }
            });
        }

        /**
         * Shows the error display
         */
        function showError(message) {
            errorTextEl.textContent = message;
            errorEl.style.display = 'block';
            resultsSectionEl.style.display = 'none';
            errorEl.style.animation = 'slideDown 0.3s ease-out';
        }

        /**
         * Sets the loading state of the submit button
         */
        function setLoading(isLoading) {
            if (isLoading) {
                runBtn.disabled = true;
                runBtn.classList.add('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'Simulating...';
                loadingSpinner.style.display = 'block';
                errorEl.style.display = 'none';
            } else {
                runBtn.disabled = false;
                runBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnText.textContent = 'Run Simulation';
                loadingSpinner.style.display = 'none';
            }
        }

    </script>
</body>

</html>
